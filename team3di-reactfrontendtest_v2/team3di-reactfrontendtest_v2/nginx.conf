server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA ──────────────────────────────────────────
    # Try the requested file/folder; fall back to index.html
    # so client-side React Router paths resolve correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ──────────────────────────────────────────
    # Forwards /api/* to the Spring Boot backend container.
    # Using the Docker Compose service name "backend" as host.
    # This makes all API calls same-origin from the browser,
    # eliminating any CORS configuration requirement.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
